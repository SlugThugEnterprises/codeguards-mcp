# CodeGuards self-config
guards:
  file_length:
    max_prod: 800
    max_test: 600
  function_length:
    max: 60
  parameter_count:
    max_params: 7
  fan_out:
    max_dependencies: 25
  god_file:
    max_public_items: 25
    max_imports: 40
  deep_nesting:
    max_depth: 15
  forbidden_phrases:
    enabled: false
  missing_docs:
    enabled: false
  missing_tests:
    min_test_ratio: 0.0
  magic_numbers:
    enabled: false
