# CodeGuards self-config — tuned for a multi-module Python project where
# orchestrator files (server.py, guards/__init__.py) legitimately touch
# many internal domains.
guards:
  file_length:
    max_prod: 800
    max_test: 600
  function_length:
    max: 60
  parameter_count:
    max_params: 7
  fan_out:
    max_dependencies: 30
  god_file:
    max_public_items: 25
    max_imports: 40
  deep_nesting:
    max_depth: 15
  forbidden_phrases:
    enabled: false
  missing_docs:
    enabled: false
  missing_tests:
    min_test_ratio: 0.0
  magic_numbers:
    enabled: false
  structural_health:
    enabled: false
  responsibility_clusters:
    enabled: false
  duplicated_code:
    enabled: false
