# CodeGuards — per-project code governance config
# Place this in your project root to override defaults.
# Set any guard to enabled: false to disable it.

guards:
  # ── Architecture ──
  file_length:
    enabled: true
    max_prod: 200
    max_test: 500

  function_length:
    enabled: true
    max: 50

  god_file:
    enabled: true
    max_public_items: 15
    max_imports: 20

  # ── Code Quality ──
  forbidden_phrases:
    enabled: true
    patterns:
      - { pattern: "\\bfor now\\b", message: use a definitive statement or remove }
      - { pattern: "\\btemporary\\b", message: use a definitive statement or remove }
      - { pattern: "\\bshould\\b", message: use `must` or remove }
      - { pattern: "\\bclean\\b", message: describe the concrete design instead }
      - { pattern: "\\bsimple\\b", message: describe the concrete design instead }
      - { pattern: "\\bmaybe\\b", message: use a definitive statement or remove }

  glob_imports:
    enabled: true

  debug_statements:
    enabled: true

  commented_code:
    enabled: true
    min_lines: 5

  magic_numbers:
    enabled: true

  duplicated_code:
    enabled: true
    n_gram_size: 5
    min_repeats: 2
    min_line_len: 10

  # ── Complexity ──
  deep_nesting:
    enabled: true
    max_depth: 3

  parameter_count:
    enabled: true
    max_params: 5

  # ── Security ──
  credentials:
    enabled: true
    patterns:
      - { pattern: "AKIA[0-9A-Z]{16}", message: "AWS access key detected" }
      - { pattern: "sk-[a-zA-Z0-9]{20,}", message: "OpenAI API key detected" }
      - { pattern: "ghp_[a-zA-Z0-9]{36}", message: "GitHub token detected" }

  unsafe_patterns:
    enabled: true

  # ── Maintainability ──
  action_items:
    enabled: true
    require_issue: true

  hardcoded_values:
    enabled: true

  missing_docs:
    enabled: true

  # ── Error Handling ──
  swallowed_errors:
    enabled: true

  no_stubs:
    enabled: true

  # ── Testing ──
  missing_tests:
    enabled: true
    min_test_ratio: 0.3
